name: Backend CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: resume_app
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ptest"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=20s

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=10s

    env:
      NODE_ENV: test
      PORT: '3000'
      DB_HOST: 127.0.0.1
      DB_PORT: '3306'
      DB_USER: root
      DB_PASSWORD: test
      DB_NAME: resume_app
      DB_POOL_SIZE: '10'
      DB_MAX_IDLE: '5'
      DB_SLOW_QUERY_MS: '1000'
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: '6379'
      JWT_SECRET: test-secret-not-for-prod-do-not-use-anywhere-real
      JWT_EXPIRES_IN: '30d'
      WX_APPID: test_appid
      WX_SECRET: test_secret
      DEEPSEEK_API_KEY: sk-test-placeholder
      DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
      DEEPSEEK_MODEL: deepseek-chat
      ALERT_TOKEN: test-alert-token
      LOG_LEVEL: info
      CORS_ALLOWED_ORIGINS: https://servicewechat.com
      SENTRY_DSN: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Install mini-program dependencies
        working-directory: mini-program
        run: npm ci || npm install --no-audit --no-fund

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Lint mini-program
        working-directory: mini-program
        run: npm run lint

      - name: Initialize test schema and seed data
        working-directory: backend
        run: node scripts/db-init.js --test

      - name: Run tests
        working-directory: backend
        run: node run-tests.js

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-output
          path: |
            backend/test-output.log
            backend/**/*.log
          if-no-files-found: ignore
          retention-days: 7