name: Deploy
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch or SHA)'
        required: true
        default: 'develop'
      validate_only:
        description: 'Validate secrets + connectivity only (skip package/deploy)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
jobs:
  validate:
    if: ${{ inputs.validate_only == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: SSH connectivity check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "[validate] host=$(hostname)"
            echo "[validate] uptime=$(uptime -p)"
            pm2 show resume-app-backend 2>&1 | grep -E 'status|uptime' | head -5
            curl -sS -m 5 -o /dev/null -w '[validate] /api/health => %{http_code}\n' http://127.0.0.1:3000/api/health || true
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - name: Tar backend (exclude node_modules, .env, logs)
        run: |
          tar --exclude='node_modules' --exclude='.env' --exclude='*.log' \
              --exclude='tests' --exclude='coverage' \
              -czf resume-app-backend.tar.gz backend/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-app-backend
          path: resume-app-backend.tar.gz
  deploy:
    if: ${{ inputs.validate_only != 'true' }}
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: resume-app-backend
      - name: SCP to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: 'resume-app-backend.tar.gz'
          target: '/tmp/'
          command_timeout: '60s'
      - name: Run deploy script on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            DEPLOY_TARBALL=/tmp/resume-app-backend.tar.gz \
            PM2_NAME=resume-app-backend \
            bash /opt/resume-app/backend/scripts/deploy.sh
