name: Upload Mini-Program

on:
  push:
    branches: [develop]
    paths:
      - 'mini-program/**'
      - '.github/workflows/upload-miniprogram.yml'
  workflow_dispatch:
    inputs:
      version:
        description: '体验版版本号 (e.g. 1.0.1)'
        required: false
        default: '1.0.0'
      desc:
        description: '体验版描述'
        required: false
        default: 'auto upload via GH Actions'

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mini-program/package-lock.json

      - name: Install miniprogram-ci
        working-directory: mini-program
        run: npm ci

      - name: Decode code upload key
        run: |
          echo "${{ secrets.WX_MINIPROGRAM_KEY_BASE64 }}" | base64 -d > /tmp/wx_private.key
          ls -la /tmp/wx_private.key

      - name: Upload experience version
        working-directory: mini-program
        env:
          VERSION: ${{ github.event.inputs.version || format('1.0.{0}', github.run_number) }}
          DESC: ${{ github.event.inputs.desc || format('GH Actions auto upload #{0}', github.run_number) }}
        run: |
          npx miniprogram-ci upload \
            --pp ./ \
            --pkp /tmp/wx_private.key \
            --appid wx3c0c93a02f5d2356 \
            --uv "$VERSION" \
            --udata "$DESC"

      - name: Cleanup key
        if: always()
        run: rm -f /tmp/wx_private.key

      - name: Summary
        if: success()
        run: |
          echo "## Mini-Program Upload" >> $GITHUB_STEP_SUMMARY
          echo "- Version: \`${{ env.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY