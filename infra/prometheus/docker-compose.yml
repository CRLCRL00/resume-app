# R41-Gap-9: 最低成本启动 Prometheus + Alertmanager + Grafana（单 docker-compose）
#
# 用法：
#   在 server（或其他监控 VM）上：
#     mkdir -p /opt/prom-stack && cd /opt/prom-stack
#     cp infra/prometheus/docker-compose.yml .
#     mkdir -p prometheus rules alertmanager grafana/provisioning
#     cp infra/prometheus/prometheus.yml ./prometheus/
#     cp infra/prometheus/alerts.yml ./prometheus/rules/
#     cp infra/prometheus/alertmanager.yml ./alertmanager/
#     # 改 alertmanager.yml 里的 ${SLACK_WEBHOOK_URL} 等 env（用 .env 文件）
#     # 起：
#     docker compose up -d
#     # 验证：
#     curl http://localhost:9090/api/v1/rules | jq '.data.groups[].rules[].name'
#     open http://localhost:3000  # Grafana (admin / admin via env)

version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'  # 支持 `curl -X POST /-/reload` 热加载规则
    networks:
      - prom-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - '9093:9093'
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      PAGERDUTY_SERVICE_KEY: ${PAGERDUTY_SERVICE_KEY:-}
    networks:
      - prom-net

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin-change-me}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - prom-net
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:

networks:
  prom-net:
    driver: bridge
