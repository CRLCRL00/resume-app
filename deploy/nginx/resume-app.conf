# /etc/nginx/sites-enabled/resume-app.conf (部署时拷贝到服务器)
# 开发期：自签证书 + IP 访问
#
# 历史踩坑（2026-06-27 修）：
#   1. nginx.conf 没 include conf.d/*，原文件 cp 到 conf.d/ 是死档
#      修复：cp 到 sites-enabled/（这台机器所有项目都走 sites-enabled）
#   2. mbti-admin 进程 + mbti-api (3001) 一直跑着，IP HTTPS 之前
#      被 aigc.crlcrl.com 等其他 server 兜底，落到 3001
#      修复：加 `default_server` 强制兜底 IP 请求到 resume-app
#   3. nginx 1.24 不支持独立 `http2 on;` 指令
#      修复：删掉，要用就在 listen 后面加 `http2`（listen 443 ssl http2）
#   4. 端口 3002 被 mbti-admin web 占，改 3003

upstream resume_app_backend {
  server 127.0.0.1:3003;
  keepalive 32;
}

server {
  listen 80 default_server;
  server_name _;  # dev 期用 IP，备案后改域名

  # 强制跳 HTTPS
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl default_server;

  server_name _;

  # 自签证书路径（部署时生成）
  ssl_certificate     /etc/nginx/ssl/resume-app.crt;
  ssl_certificate_key /etc/nginx/ssl/resume-app.key;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  # 通用安全头
  add_header X-Frame-Options DENY;
  add_header X-Content-Type-Options nosniff;
  add_header X-XSS-Protection "1; mode=block";

  # 客户端 body 上限
  client_max_body_size 2m;

  # API 反代
  location /api/ {
    proxy_pass http://resume_app_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 35s;  # 略大于 LLM 35s 前端超时
  }

  # 健康检查单独暴露（不需走反代）
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}